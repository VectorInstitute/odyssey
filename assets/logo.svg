<svg width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!--
      Vector brand palette:
        magenta   #EB088A   (primary)
        cobalt    #313CFF
        violet    #8A25C9
        turquoise #48C0D9
    -->

    <!-- Ambient glow behind icon — magenta tint -->
    <radialGradient id="glowbg" cx="155" cy="90" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EB088A" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#EB088A" stop-opacity="0"/>
    </radialGradient>

    <!-- Wave gradient: magenta → violet → cobalt (left → right) -->
    <linearGradient id="waveg" x1="20" y1="0" x2="295" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#EB088A"/>
      <stop offset="50%"  stop-color="#8A25C9"/>
      <stop offset="100%" stop-color="#313CFF"/>
    </linearGradient>

    <!-- Wordmark gradient -->
    <linearGradient id="tg" x1="345" y1="0" x2="730" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#EB088A"/>
      <stop offset="100%" stop-color="#313CFF"/>
    </linearGradient>

    <!-- Strong glow for foreground elements -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for secondary elements -->
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;800&amp;display=swap');
      @keyframes flow { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -19; } }
      .wave-fg { animation: flow 1.6s linear infinite; }
      .wave-bg { animation: flow 1.6s linear infinite; animation-delay: -0.8s; }
    </style>
  </defs>

  <!-- Ambient glow -->
  <rect width="800" height="180" rx="16" fill="url(#glowbg)"/>

  <!--
    Icon: Mamba-3 SSM state trajectory — a smooth 2-cycle sine wave
    representing a patient's clinical time series flowing through the model.

    Center y=90, amplitude=40 (y: 50–130), x: 20–290
      peak 1  at ~(65, 50)
      zero 1  at  (110, 90)
      trough  at ~(155, 130)
      zero 2  at  (200, 90)
      peak 2  at ~(245, 50)
      end     at  (290, 90)
  -->

  <!-- Wave — back layer, dim echo -->
  <path class="wave-bg"
        d="M20,90 C43,50 87,50 110,90 C133,130 177,130 200,90 C223,50 267,50 290,90"
        stroke="url(#waveg)" stroke-width="2" fill="none" stroke-linecap="round"
        stroke-dasharray="6 13" opacity="0.30"/>

  <!-- Wave — front layer, glowing -->
  <path class="wave-fg"
        d="M20,90 C43,50 87,50 110,90 C133,130 177,130 200,90 C223,50 267,50 290,90"
        stroke="url(#waveg)" stroke-width="2.8" fill="none" stroke-linecap="round"
        stroke-dasharray="6 13" filter="url(#glow)" opacity="0.95"/>

  <!-- Event nodes — clinical events sampled from the trajectory -->

  <!-- Origin node (x=20, y=90) — small, muted -->
  <circle cx="20" cy="90" r="3" fill="#EB088A" opacity="0.5"/>

  <!-- Peak 1 (x=65, y=50) — admission event, magenta, pulsing -->
  <circle cx="65" cy="50" r="5.5" fill="#EB088A" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Zero crossing (x=110, y=90) — lab event, violet -->
  <circle cx="110" cy="90" r="4.5" fill="#8A25C9" filter="url(#softglow)">
    <animate attributeName="r" values="4.5;5.5;4.5" dur="1.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Trough (x=155, y=130) — medication event, cobalt, counter-phase pulse -->
  <circle cx="155" cy="130" r="5.5" fill="#313CFF" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Zero crossing (x=200, y=90) — diagnosis event, violet -->
  <circle cx="200" cy="90" r="4" fill="#8A25C9" filter="url(#softglow)" opacity="0.75"/>

  <!-- Peak 2 (x=245, y=50) — procedure event, magenta, offset pulse -->
  <circle cx="245" cy="50" r="5.5" fill="#EB088A" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Forecast node (x=290, y=90) — next-event prediction, turquoise ring pulse -->
  <circle cx="290" cy="90" r="7" fill="none" stroke="#48C0D9" stroke-width="1.5">
    <animate attributeName="r" values="7;14;7" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="290" cy="90" r="4" fill="#48C0D9" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- "odyssey" wordmark — magenta → cobalt gradient -->
  <text x="345" y="118"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="84" font-weight="800" letter-spacing="-4"
        fill="url(#tg)">odyssey</text>

  <!-- Tagline -->
  <text x="347" y="148"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="500" letter-spacing="3.5"
        fill="#4a4a6a">clinical foundation models</text>
</svg>
